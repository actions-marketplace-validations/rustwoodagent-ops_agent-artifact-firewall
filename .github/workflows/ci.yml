name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.2'
      - run: go test ./...
      - run: go run ./cmd/aaf scan examples/safe-skill
      - run: go run ./cmd/aaf scan examples/malicious-skill --no-fail
      - run: go run ./cmd/aaf scan examples/malicious-skill --format sarif --out artifacts/aaf.sarif --no-fail
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: artifacts/aaf.sarif
