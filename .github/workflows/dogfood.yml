name: Dogfood
on:
  pull_request:
  push:
    branches: [main]
jobs:
  dogfood:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run terminal demo against malicious fixture
        uses: ./.github/actions/aaf
        with:
          path: examples/malicious-skill
          format: text
          fail_on: none
          max_risk_score: '0'
          upload_sarif: 'false'
          enforce_failure: 'false'

      - name: Prepare clean dogfood scan path
        run: |
          rm -rf .dogfood-scan
          mkdir -p .dogfood-scan
          rsync -a ./ ./.dogfood-scan/ --exclude .git --exclude .dogfood-scan --exclude examples/malicious-skill

      - name: Generate and upload SARIF for repo scan
        uses: ./.github/actions/aaf
        with:
          path: .dogfood-scan
          format: sarif
          out: artifacts/aaf.sarif
          fail_on: high
          max_risk_score: '70'
          upload_sarif: 'true'
