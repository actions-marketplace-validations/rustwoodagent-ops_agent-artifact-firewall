name: Dogfood
on:
  pull_request:
  push:
    branches: [main]
jobs:
  dogfood:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run AGENT-ARTIFACT-FIREWALL
        uses: ./.github/actions/aaf
        with:
          path: .
          format: sarif
          out: artifacts/aaf.sarif
          fail-on: high
          max-risk-score: '70'
