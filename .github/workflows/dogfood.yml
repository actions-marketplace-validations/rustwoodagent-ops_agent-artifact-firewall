name: Dogfood AGENT-ARTIFACT-FIREWALL
on:
  pull_request:
  push:
    branches: [main]
jobs:
  scan-agent-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Scan repo agent artifacts
        run: go run ./cmd/aaf scan . --format sarif --out aaf.sarif --fail-on high
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: aaf.sarif
